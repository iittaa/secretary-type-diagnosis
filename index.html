<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIオンライン秘書 適性診断</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #FDF8F3;
            color: #5C4A3A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ========== スタート画面 ========== */
        .screen {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .start-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .start-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #6B5344;
        }

        .start-subtitle {
            font-size: 14px;
            color: #9C8878;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .btn-start {
            background: linear-gradient(135deg, #D4A574, #C4956A);
            color: #fff;
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.5);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        /* ========== 質問画面 ========== */
        .question-screen {
            width: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #EDE3D9;
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #D4A574, #C4956A);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .part-label {
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: #C4956A;
            background: #F5E6D8;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .part-label-wrapper {
            text-align: center;
            margin-bottom: 4px;
        }

        .question-number {
            font-size: 13px;
            color: #B8A090;
            margin-bottom: 12px;
            text-align: center;
        }

        .question-text {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #6B5344;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .choice-btn {
            background: #FFFFFF;
            border: 2px solid #EDE3D9;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 500;
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #6B5344;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            line-height: 1.5;
        }

        .choice-btn:hover {
            border-color: #D4A574;
            background: #FFF9F4;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.15);
        }

        .choice-btn:active {
            transform: translateY(0);
            background: #F5E6D8;
            border-color: #D4A574;
        }

        .choice-btn.yes-btn:hover {
            border-color: #D4A574;
            background: #FFF3E8;
        }

        .choice-btn.no-btn:hover {
            border-color: #C4B5A5;
            background: #F5F0EB;
        }

        .btn-back {
            background: transparent;
            border: none;
            color: #B8A090;
            font-size: 14px;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            margin-top: 16px;
            padding: 8px 16px;
            transition: color 0.3s ease;
        }

        .btn-back:hover {
            color: #7A6555;
        }

        /* ========== 分析中画面 ========== */
        .analyzing-screen {
            text-align: center;
        }

        .analyzing-icon {
            font-size: 48px;
            margin-bottom: 24px;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .analyzing-text {
            font-size: 18px;
            font-weight: 700;
            color: #6B5344;
            margin-bottom: 12px;
        }

        .analyzing-sub {
            font-size: 13px;
            color: #B8A090;
        }

        .dot-animation span {
            animation: dotBlink 1.4s infinite;
            font-size: 24px;
        }

        .dot-animation span:nth-child(2) { animation-delay: 0.2s; }
        .dot-animation span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBlink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        /* ========== 結果画面 ========== */
        .result-screen {
            text-align: center;
            width: 100%;
        }

        .result-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 8px 30px rgba(108, 83, 68, 0.08);
            margin-bottom: 24px;
        }

        .result-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .result-label {
            font-size: 13px;
            color: #B8A090;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .result-type {
            font-size: 26px;
            font-weight: 700;
            color: #6B5344;
            margin-bottom: 4px;
        }

        .result-catchcopy {
            font-size: 14px;
            color: #C4956A;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .result-divider {
            width: 40px;
            height: 2px;
            background: #EDE3D9;
            margin: 0 auto 20px;
        }

        .result-description {
            font-size: 14px;
            line-height: 2;
            color: #7A6555;
            text-align: left;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 13px;
            color: #B8A090;
            margin-bottom: 16px;
        }

        .result-score strong {
            font-size: 28px;
            color: #D4A574;
            font-weight: 700;
        }

        .score-bar-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .score-bar-bg {
            width: 100%;
            height: 10px;
            background: #EDE3D9;
            border-radius: 5px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #D4A574, #C4956A);
            border-radius: 5px;
            transition: width 1s ease;
        }

        .part-scores {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 20px;
        }

        .part-score-item {
            flex: 1;
            background: #FDF8F3;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .part-score-label {
            font-size: 11px;
            color: #B8A090;
            margin-bottom: 4px;
        }

        .part-score-value {
            font-size: 18px;
            font-weight: 700;
            color: #6B5344;
        }

        .result-action-label {
            font-size: 12px;
            color: #B8A090;
            margin-bottom: 10px;
        }

        .result-action {
            background: #FDF8F3;
            border-radius: 16px;
            padding: 16px 20px;
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
            color: #6B5344;
        }

        .btn-retry {
            background: transparent;
            border: 2px solid #D4A574;
            color: #D4A574;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-retry:hover {
            background: #D4A574;
            color: #fff;
        }

        .btn-survey {
            background: linear-gradient(135deg, #D4A574, #C4956A);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
            margin-bottom: 12px;
            width: 100%;
            max-width: 280px;
        }

        .btn-survey:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.5);
        }

        /* ========== アンケート画面 ========== */
        .survey-screen {
            width: 100%;
        }

        .survey-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 8px 30px rgba(108, 83, 68, 0.08);
            margin-bottom: 24px;
        }

        .survey-title {
            font-size: 20px;
            font-weight: 700;
            color: #6B5344;
            text-align: center;
            margin-bottom: 8px;
        }

        .survey-subtitle {
            font-size: 13px;
            color: #B8A090;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #6B5344;
            margin-bottom: 8px;
        }

        .form-label .required {
            color: #E07A5F;
            font-size: 12px;
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #EDE3D9;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #5C4A3A;
            background: #FDF8F3;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #D4A574;
        }

        .form-input::placeholder {
            color: #C4B5A5;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #FDF8F3;
            border: 2px solid #EDE3D9;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .radio-option:hover {
            border-color: #D4A574;
            background: #FFF9F4;
        }

        .radio-option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #D4C4B4;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            cursor: pointer;
        }

        .radio-option input[type="radio"]:checked {
            border-color: #D4A574;
        }

        .radio-option input[type="radio"]:checked::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 10px;
            height: 10px;
            background: #D4A574;
            border-radius: 50%;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            color: #6B5344;
            font-weight: 500;
        }

        .radio-label {
            font-size: 14px;
            color: #7A6555;
            cursor: pointer;
        }

        .btn-submit {
            background: linear-gradient(135deg, #D4A574, #C4956A);
            color: #fff;
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.5);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-skip {
            background: transparent;
            border: none;
            color: #B8A090;
            font-size: 13px;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            margin-top: 12px;
            text-decoration: underline;
        }

        /* ========== 送信完了画面 ========== */
        .thanks-screen {
            text-align: center;
        }

        .thanks-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .thanks-title {
            font-size: 22px;
            font-weight: 700;
            color: #6B5344;
            margin-bottom: 12px;
        }

        .thanks-message {
            font-size: 14px;
            color: #9C8878;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .form-error {
            color: #E07A5F;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        /* ========== レスポンシブ ========== */
        @media (max-width: 380px) {
            .container {
                padding: 32px 16px;
            }
            .start-title {
                font-size: 22px;
            }
            .question-text {
                font-size: 18px;
            }
            .result-type {
                font-size: 22px;
            }
            .part-scores {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- スタート画面 -->
        <div id="start-screen" class="screen active">
            <div class="start-icon">💼</div>
            <h1 class="start-title">AIオンライン秘書<br>適性診断</h1>

            <p class="start-subtitle">
                15のYES/NO質問に答えるだけで<br>
                あなたのAIオンライン秘書<br>
                適性タイプがわかります
            </p>
            <button class="btn-start" onclick="startQuiz()">診断スタート</button>
        </div>

        <!-- 質問画面 -->
        <div id="question-screen" class="screen question-screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="part-label-wrapper">
                <span class="part-label" id="part-label"></span>
            </div>
            <div class="question-number" id="question-number"></div>
            <div class="question-text" id="question-text"></div>
            <div class="choices" id="choices"></div>
            <button class="btn-back" id="btn-back" onclick="goBack()" style="display: none;">&larr; 前の質問に戻る</button>
        </div>

        <!-- 分析中画面 -->
        <div id="analyzing-screen" class="screen analyzing-screen">
            <div class="analyzing-icon">✨</div>
            <div class="analyzing-text">AIがあなたを分析中</div>
            <div class="dot-animation">
                <span>.</span><span>.</span><span>.</span>
            </div>
            <p class="analyzing-sub" style="margin-top: 16px;">あなたの回答からぴったりのタイプを診断しています</p>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="screen result-screen">
            <div class="result-card">
                <div class="result-icon" id="result-icon"></div>
                <div class="result-label">YOUR TYPE</div>
                <div class="result-type" id="result-type"></div>
                <div class="result-catchcopy" id="result-catchcopy"></div>
                <div class="result-divider"></div>
                <div class="result-score" id="result-score"></div>
                <div class="score-bar-container">
                    <div class="score-bar-bg">
                        <div class="score-bar-fill" id="score-bar-fill"></div>
                    </div>
                </div>
                <div class="part-scores" id="part-scores"></div>
                <div class="result-description" id="result-description"></div>
                <div class="result-action-label">今日やる1アクション</div>
                <div class="result-action" id="result-action"></div>
            </div>
            <button class="btn-survey" onclick="showSurvey()">アンケートに回答する</button>
            <button class="btn-retry" onclick="retry()">もう一度診断する</button>
        </div>

        <!-- アンケート画面 -->
        <div id="survey-screen" class="screen survey-screen">
            <div class="survey-card">
                <div class="survey-title">📝 アンケート</div>
                <p class="survey-subtitle">
                    ご回答ありがとうございます！<br>
                    かんたんなアンケートにご協力ください
                </p>

                <form id="survey-form" onsubmit="return false;">
                    <div class="form-group">
                        <label class="form-label">お名前（ニックネーム可）<span class="required">*必須</span></label>
                        <input type="text" class="form-input" id="survey-name" placeholder="例：はなこ" required>
                        <div class="form-error" id="error-name">お名前を入力してください</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Instagram ID</label>
                        <input type="text" class="form-input" id="survey-instagram" placeholder="例：@hanako_123">
                    </div>

                    <div class="form-group">
                        <label class="form-label">オンライン秘書に興味はありますか？<span class="required">*必須</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="interest" value="とても興味がある">
                                <span class="radio-label">とても興味がある</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="interest" value="少し興味がある">
                                <span class="radio-label">少し興味がある</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="interest" value="どちらともいえない">
                                <span class="radio-label">どちらともいえない</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="interest" value="あまり興味がない">
                                <span class="radio-label">あまり興味がない</span>
                            </label>
                        </div>
                        <div class="form-error" id="error-interest">選択してください</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">ご意見・ご感想（自由記述）</label>
                        <textarea class="form-input" id="survey-comment" placeholder="診断の感想や秘書スクールへのご質問など、お気軽にどうぞ！"></textarea>
                    </div>

                    <button type="button" class="btn-submit" id="btn-submit" onclick="submitSurvey()">送信する</button>
                </form>
                <button class="btn-skip" onclick="showThanks(true)">スキップする</button>
            </div>
        </div>

        <!-- 送信完了画面 -->
        <div id="thanks-screen" class="screen thanks-screen">
            <div class="thanks-icon">🎉</div>
            <div class="thanks-title">ありがとうございました！</div>
            <p class="thanks-message" id="thanks-message">
                アンケートへのご協力<br>ありがとうございます！<br><br>
                オンライン秘書スクールの情報は<br>Instagramでお届けします✨
            </p>
            <button class="btn-retry" onclick="retry()">もう一度診断する</button>
        </div>

    </div>

    <script>
        // ========== 質問データ ==========
        const questions = [
            // Part1: 基礎マインド診断（Q1〜Q5）
            { part: 1, partName: "基礎マインド診断", text: "分からないことは\n「まず検索」する方だ" },
            { part: 1, partName: "基礎マインド診断", text: "丁寧な言葉遣いは\n嫌いじゃない" },
            { part: 1, partName: "基礎マインド診断", text: "誰かの「助かった」が\n自分の喜びになる" },
            { part: 1, partName: "基礎マインド診断", text: "コツコツ作業、\n意外と嫌いじゃない" },
            { part: 1, partName: "基礎マインド診断", text: "新しいツール、\n触ってみたい派" },
            // Part2: AI適応力診断（Q6〜Q10）
            { part: 2, partName: "AI適応力診断", text: "スマホのアプリ、\n自分でインストールできる" },
            { part: 2, partName: "AI適応力診断", text: "LINEやInstagram、\n使いこなしてる" },
            { part: 2, partName: "AI適応力診断", text: "「AIに聞いてみよう」\nって発想、ちょっとある" },
            { part: 2, partName: "AI適応力診断", text: "間違えても、\nやり直せばいいと思える" },
            { part: 2, partName: "AI適応力診断", text: "「楽できるなら楽したい」\nと思う" },
            // Part3: 在宅ワーク耐性診断（Q11〜Q15）
            { part: 3, partName: "在宅ワーク耐性診断", text: "一人作業、\n苦じゃない" },
            { part: 3, partName: "在宅ワーク耐性診断", text: "締切は前倒し派 or\nちゃんと守る派" },
            { part: 3, partName: "在宅ワーク耐性診断", text: "家でオンオフの\n切り替えができる" },
            { part: 3, partName: "在宅ワーク耐性診断", text: "報告・連絡・相談、\n面倒くさがらない" },
            { part: 3, partName: "在宅ワーク耐性診断", text: "「顔出しなし」で\n働きたい気持ちが強い" }
        ];

        // ========== 結果データ ==========
        const results = [
            {
                min: 12, max: 15,
                icon: "🔥",
                type: "即スタート型",
                catchcopy: "もう始めていいレベル",
                description: "迷ってる時間がもったいないタイプ。\n\nあなたは基礎マインド・AI適応力・在宅ワーク耐性のすべてにおいて高い適性を持っています。\n\nオンライン秘書として活躍するための素質は十分。あとは最初の一歩を踏み出すだけです。",
                action: "クラウドワークスで「オンライン秘書」と検索してみて。どんな案件があるか、リアルが見えてくる🔥"
            },
            {
                min: 8, max: 11,
                icon: "✨",
                type: "伸びしろ型",
                catchcopy: "素質は十分、やり方を知るだけで化ける",
                description: "あなたには十分な素質があります。\n\n「やり方」を知るだけで一気に伸びるタイプ。学ぶ環境を1つ決めれば、驚くほど早く成長できるでしょう。\n\nAI時代のオンライン秘書は、あなたのような柔軟な人が最も活躍できます。",
                action: "Geminiに「私に向いてる在宅ワーク教えて」と入力してみて。AIに相談する感覚を今日つかんで✨"
            },
            {
                min: 4, max: 7,
                icon: "🕊️",
                type: "じっくり型",
                catchcopy: "焦らなくていい、得意を伸ばそう",
                description: "焦る必要はまったくありません。\n\n苦手を潰すより、YESだった項目を伸ばす方がずっと早い。得意な1点から広げていけば、自然とスキルは身についていきます。\n\nあなたのペースで、確実に前に進んでいきましょう。",
                action: "今日の家事の予定、AIに相談してみて。ChatGPTでもGeminiでもOK。使うだけで世界が広がる💎"
            },
            {
                min: 0, max: 3,
                icon: "🌿",
                type: "準備期間型",
                catchcopy: "今は情報収集フェーズ、大丈夫",
                description: "今はまだ情報収集のフェーズ。それでまったく問題ありません。\n\nNOの項目は「今の状態」であって、あなたの限界ではありません。無料のAIツールを1つ触るところから始めるだけで、世界が変わります。\n\n適性は「今」じゃなくて「伸びる角度」で見るもの。あなたの可能性はこれからです。",
                action: "ChatGPTのアカウント作成だけする。それが今日の100点🕊️"
            }
        ];

        // ========== ゲーム状態 ==========
        let currentQuestion = 0;
        let yesCount = 0;
        let partScores = { 1: 0, 2: 0, 3: 0 };
        let answerHistory = [];
        let diagnosisResult = '';

        // Google Apps Script のデプロイURL を設定してください
        const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';

        // ========== 関数 ==========
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById(screenId);
            screen.classList.remove('active');
            void screen.offsetWidth;
            screen.classList.add('active');
        }

        function startQuiz() {
            currentQuestion = 0;
            yesCount = 0;
            partScores = { 1: 0, 2: 0, 3: 0 };
            answerHistory = [];
            showQuestion();
        }

        function showQuestion() {
            showScreen('question-screen');
            const q = questions[currentQuestion];

            document.getElementById('progress-fill').style.width = ((currentQuestion + 1) / questions.length * 100) + '%';
            document.getElementById('part-label').textContent = `Part${q.part}：${q.partName}`;
            document.getElementById('question-number').textContent = `Q${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').textContent = q.text;

            const choicesEl = document.getElementById('choices');
            choicesEl.innerHTML = '';

            const yesBtn = document.createElement('button');
            yesBtn.className = 'choice-btn yes-btn';
            yesBtn.textContent = '⭕ YES';
            yesBtn.onclick = () => selectChoice(true);
            choicesEl.appendChild(yesBtn);

            const noBtn = document.createElement('button');
            noBtn.className = 'choice-btn no-btn';
            noBtn.textContent = '✖️ NO';
            noBtn.onclick = () => selectChoice(false);
            choicesEl.appendChild(noBtn);

            document.getElementById('btn-back').style.display = currentQuestion > 0 ? 'block' : 'none';
        }

        function selectChoice(isYes) {
            const q = questions[currentQuestion];

            answerHistory.push({ questionIndex: currentQuestion, isYes: isYes, part: q.part });

            if (isYes) {
                yesCount++;
                partScores[q.part]++;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showAnalyzing();
            }
        }

        function goBack() {
            if (answerHistory.length === 0) return;

            const lastAnswer = answerHistory.pop();

            if (lastAnswer.isYes) {
                yesCount--;
                partScores[lastAnswer.part]--;
            }

            currentQuestion = lastAnswer.questionIndex;
            showQuestion();
        }

        function showAnalyzing() {
            showScreen('analyzing-screen');
            setTimeout(() => {
                showResult();
            }, 2500);
        }

        function showResult() {
            showScreen('result-screen');

            const result = results.find(r => yesCount >= r.min && yesCount <= r.max);
            diagnosisResult = result.type;

            document.getElementById('result-icon').textContent = result.icon;
            document.getElementById('result-type').textContent = result.type;
            document.getElementById('result-catchcopy').textContent = result.catchcopy;
            document.getElementById('result-score').innerHTML = `YESの数 <strong>${yesCount}</strong> / 15`;
            document.getElementById('score-bar-fill').style.width = (yesCount / 15 * 100) + '%';

            const partScoresEl = document.getElementById('part-scores');
            partScoresEl.innerHTML = '';
            const partNames = ['基礎マインド', 'AI適応力', '在宅ワーク耐性'];
            for (let i = 1; i <= 3; i++) {
                const item = document.createElement('div');
                item.className = 'part-score-item';
                item.innerHTML = `<div class="part-score-label">${partNames[i - 1]}</div><div class="part-score-value">${partScores[i]} / 5</div>`;
                partScoresEl.appendChild(item);
            }

            document.getElementById('result-description').textContent = result.description;
            document.getElementById('result-action').textContent = result.action;
        }

        // ========== アンケート ==========
        function showSurvey() {
            showScreen('survey-screen');
            document.getElementById('survey-form').reset();
            document.querySelectorAll('.form-error').forEach(e => e.style.display = 'none');
        }

        function submitSurvey() {
            const name = document.getElementById('survey-name').value.trim();
            const interest = document.querySelector('input[name="interest"]:checked');
            let hasError = false;

            if (!name) {
                document.getElementById('error-name').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('error-name').style.display = 'none';
            }

            if (!interest) {
                document.getElementById('error-interest').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('error-interest').style.display = 'none';
            }

            if (hasError) return;

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = '送信中...';

            const data = {
                timestamp: new Date().toLocaleString('ja-JP'),
                name: name,
                instagram: document.getElementById('survey-instagram').value.trim(),
                interest: interest.value,
                comment: document.getElementById('survey-comment').value.trim(),
                diagnosisResult: diagnosisResult,
                yesCount: yesCount,
                partScores: JSON.stringify(partScores)
            };

            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL') {
                console.log('アンケート回答データ:', data);
                showThanks(false);
                return;
            }

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(() => {
                showThanks(false);
            })
            .catch(error => {
                console.error('送信エラー:', error);
                alert('送信に失敗しました。もう一度お試しください。');
                btn.disabled = false;
                btn.textContent = '送信する';
            });
        }

        function showThanks(skipped) {
            showScreen('thanks-screen');
            if (skipped) {
                document.getElementById('thanks-message').innerHTML =
                    '診断おつかれさまでした！<br><br>オンライン秘書スクールの情報は<br>Instagramでお届けします✨';
            } else {
                document.getElementById('thanks-message').innerHTML =
                    'アンケートへのご協力<br>ありがとうございます！<br><br>オンライン秘書スクールの情報は<br>Instagramでお届けします✨';
            }
        }

        function retry() {
            showScreen('start-screen');
        }
    </script>
</body>
</html>
